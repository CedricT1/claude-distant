# HTTP-only reverse proxy pour claude-distant
#
# Proxies HTTP vers le service relay (relay:8000) sur le réseau Docker interne.
# La terminaison TLS est assurée par un reverse proxy externe, de la responsabilité
# du déployeur (Caddy, Nginx, Traefik, etc.).
#
# Ce proxy transmet les en-têtes nécessaires au relay pour qu'il génère des URLs
# correctes derrière une terminaison TLS externe :
# - Host (demandé par le reverse proxy TLS externe)
# - X-Forwarded-For (adresse IP cliente)
# - X-Forwarded-Proto (doit être positionné par le proxy TLS externe à 'https')
# - X-Forwarded-Host (optionnel, pour les URL RFC 9728 OAuth)
#
# IMPORTANT : Le proxy TLS externe DOIT positionner l'en-tête
# `X-Forwarded-Proto: https` lors du forwarding vers ce nginx HTTP.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # HTTP interne uniquement : écoute sur 8080, proxy vers relay:8000
    server {
        listen 8080;
        server_name _;

        # WebSocket (client PC distant, /ws/client) + MCP Streamable HTTP
        # (harnais, /mcp, /healthz) : même reverse proxy.
        # Nginx ne détecte pas automatiquement WebSocket comme Caddy,
        # donc on force explicitement l'upgrade.
        location / {
            proxy_pass http://relay:8000;

            # HTTP/1.1 pour WebSocket upgrade et streaming
            proxy_http_version 1.1;

            # WebSocket upgrade (détecté par l'en-tête Connection: Upgrade du client)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # En-têtes nécessaires pour que le relay reconnaisse l'hôte/schéma externes
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # IMPORTANT : le proxy TLS externe DOIT positionner cet en-tête à 'https'
            # lors du forward. Si absent, utiliser la valeur du schéma de la requête HTTP
            # (qui sera 'http' en interne).
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;

            # Pas de buffering : indispensable pour le streaming SSE du transport MCP
            # Streamable HTTP et la latence du canal WebSocket.
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
